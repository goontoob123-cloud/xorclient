<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Sender - StreamCodeMOD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(24, 22, 22, 0.95);
            border-radius: 18px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 2px;
        }
        
        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .status {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            border-left: 3px solid #4caf50;
        }
        
        .status.connected {
            color: #4caf50;
            border-left-color: #4caf50;
        }
        
        .status.disconnected {
            color: #f44336;
            border-left-color: #f44336;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        
        input, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #4caf50;
            background: rgba(0, 0, 0, 0.7);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }
        
        button {
            width: 100%;
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .examples {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .examples h3 {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-bottom: 10px;
        }
        
        .example-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .example-btn {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .example-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>STREAMCODEMOD</h1>
        <div class="subtitle">Notification Sender</div>
        
        <div class="status disconnected" id="status">
            🔴 Disconnected - Waiting for connection...
        </div>
        
        <div class="input-group">
            <label>NOTIFICATION TITLE</label>
            <input type="text" id="title" placeholder="e.g., ALERT, UPDATE, JOIN" maxlength="20">
        </div>
        
        <div class="input-group">
            <label>MESSAGE</label>
            <textarea id="message" placeholder="Enter your notification message here..."></textarea>
        </div>
        
        <button onclick="sendNotification()">📨 SEND NOTIFICATION</button>
        
        <div class="examples">
            <h3>QUICK EXAMPLES</h3>
            <div class="example-buttons">
                <div class="example-btn" onclick="setExample('WELCOME', 'Welcome to the stream!')">Welcome</div>
                <div class="example-btn" onclick="setExample('FOLLOW', 'Thanks for the follow!')">Follow</div>
                <div class="example-btn" onclick="setExample('SUBSCRIBE', 'New subscriber!')">Subscribe</div>
                <div class="example-btn" onclick="setExample('DONATION', 'Thank you for the donation!')">Donation</div>
                <div class="example-btn" onclick="setExample('RAID', 'Raid incoming!')">Raid</div>
            </div>
        </div>
    </div>
    
    <script>
        let ws = null;
        
        function connectWebSocket() {
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsPort = 8080;
            ws = new WebSocket(`${wsProtocol}//${window.location.hostname}:${wsPort}`);
            
            ws.onopen = () => {
                console.log('WebSocket connected');
                const statusDiv = document.getElementById('status');
                statusDiv.className = 'status connected';
                statusDiv.innerHTML = '🟢 Connected - Ready to send notifications';
                showToast('Connected to server!', '#4caf50');
            };
            
            ws.onclose = () => {
                console.log('WebSocket disconnected');
                const statusDiv = document.getElementById('status');
                statusDiv.className = 'status disconnected';
                statusDiv.innerHTML = '🔴 Disconnected - Reconnecting...';
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                showToast(`${data.title}: ${data.message}`, '#4caf50');
            };
        }
        
        async function sendNotification() {
            const title = document.getElementById('title').value.trim();
            const message = document.getElementById('message').value.trim();
            
            if (!title || !message) {
                showToast('Please fill in both title and message!', '#f44336');
                return;
            }
            
            try {
                const response = await fetch('/api/send-notification', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ title, message })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast(`✅ ${result.message}`, '#4caf50');
                    document.getElementById('title').value = '';
                    document.getElementById('message').value = '';
                } else {
                    showToast(`❌ Error: ${result.error}`, '#f44336');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Failed to send notification', '#f44336');
            }
        }
        
        function setExample(title, message) {
            document.getElementById('title').value = title;
            document.getElementById('message').value = message;
        }
        
        function showToast(message, color) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toast.style.borderLeft = `3px solid ${color}`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        // Connect when page loads
        connectWebSocket();
    </script>
</body>
</html>
